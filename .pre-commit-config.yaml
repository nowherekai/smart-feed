repos:
  - repo: local
    hooks:
      - id: ts-type-check
        name: TypeScript type check
        entry: bash -lc 'if [ -f turbo.json ]; then if find . -type f -name "tsconfig.json" -not -path "*/node_modules/*" | grep -q .; then if [ -f pnpm-lock.yaml ]; then pnpm run check --if-present; else bun run check --if-present; fi; else echo "No workspace tsconfig.json found, skipping type check"; fi; elif [ -f tsconfig.json ]; then if [ -f pnpm-lock.yaml ]; then pnpm exec tsc --noEmit; else bunx tsc --noEmit; fi; else echo "No tsconfig.json found, skipping type check"; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-test
        name: Unit tests
        entry: bash -lc 'if find . -type f \( -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" \) | grep -q .; then if [ -f pnpm-lock.yaml ]; then pnpm test --if-present; else bun test; fi; else echo "No test files found, skipping tests"; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(\.agents/|\.claude/|\.codex/)|(\.(md|json)$)'
      - id: end-of-file-fixer
        exclude: '^(\.agents/|\.claude/|\.codex/)|(\.(md|json)$)'
      - id: check-yaml
        exclude: '^(\.agents/|\.claude/|\.codex/)'
      - id: check-json
        exclude: '^(\.agents/|\.claude/|\.codex/)|(\.json$)'
      - id: check-merge-conflict
        exclude: '^(\.agents/|\.claude/|\.codex/)'
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^(\.agents/|\.claude/|\.codex/)'
